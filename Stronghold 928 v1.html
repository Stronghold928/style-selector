<title>Stronghold 928 — A Brief & Demo Guide</title>

<style>
  :root {
    /* Warm earthy palette — softer modernism */
    --limewash:   #F4EFE6;
    --limewash-2: #EFE8DB;
    --plaster:    #EAE2D3;
    --plaster-2:  #DFD4BD;
    --oak:        #B89569;
    --oak-deep:   #8E6F4A;
    --brass:      #A88247;
    --ink:        #221E18;
    --ink-soft:   #4A4239;
    --stone:      #6E665B;
    --line:       #D9CFBE;
    --line-2:     #C8BBA3;
    --shadow:     0 1px 0 rgba(255,255,255,.55) inset, 0 18px 40px -22px rgba(34, 30, 24, .35);
  }

  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--limewash);
    color: var(--ink);
    font-family: "Geist", ui-sans-serif, system-ui, -apple-system, sans-serif;
    font-weight: 400;
    font-size: 16px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow-x: hidden;
  }

  /* Type system ----------------------------------------------------------- */
  .serif { font-family: "Instrument Serif", "Times New Roman", serif; font-weight: 400; letter-spacing: -0.005em; }
  .mono  { font-family: "JetBrains Mono", ui-monospace, monospace; font-weight: 400; }

  .eyebrow {
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--stone);
  }

  h1, h2, h3, h4, h5 { margin: 0; font-weight: 400; }
  p { margin: 0; text-wrap: pretty; }
  a { color: inherit; }
  button { font: inherit; color: inherit; }

  /* Layout helpers -------------------------------------------------------- */
  .shell { max-width: 1320px; margin: 0 auto; padding: 0 56px; }
  @media (max-width: 820px) { .shell { padding: 0 28px; } }

  .hairline { height: 1px; background: var(--line); width: 100%; }
  .hairline-strong { height: 1px; background: var(--line-2); width: 100%; }

  /* Side rail nav --------------------------------------------------------- */
  .siderail {
    position: fixed; top: 50%; left: 22px; transform: translateY(-50%);
    z-index: 50; display: flex; flex-direction: column; gap: 14px;
    font-family: "JetBrains Mono", monospace; font-size: 10px;
    letter-spacing: 0.1em; text-transform: uppercase; color: var(--stone);
  }
  .siderail button {
    display: flex; align-items: center; gap: 10px;
    background: transparent; border: 0; padding: 2px 0;
    cursor: default; color: inherit; opacity: .55;
    transition: opacity .25s ease, color .25s ease;
  }
  .siderail button:hover { opacity: 1; color: var(--ink); }
  .siderail button .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: transparent; border: 1px solid var(--line-2);
    transition: background .25s, border-color .25s;
  }
  .siderail button.active { opacity: 1; color: var(--ink); }
  .siderail button.active .dot { background: var(--ink); border-color: var(--ink); }

  @media (max-width: 980px) { .siderail { display: none; } }

  /* Top bar --------------------------------------------------------------- */
  .topbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 40;
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 32px;
    backdrop-filter: blur(14px) saturate(150%);
    -webkit-backdrop-filter: blur(14px) saturate(150%);
    background: rgba(244, 239, 230, 0.72);
    border-bottom: 1px solid transparent;
    transition: border-color .3s;
  }
  .topbar.scrolled { border-bottom-color: var(--line); }
  .topbar .brand {
    display: flex; align-items: center; gap: 12px;
    font-family: "JetBrains Mono", monospace; font-size: 11px;
    letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink);
  }
  .topbar .meta {
    display: flex; align-items: center; gap: 20px;
    font-family: "JetBrains Mono", monospace; font-size: 10.5px;
    letter-spacing: 0.12em; text-transform: uppercase; color: var(--stone);
  }
  .topbar .meta .pulse { width: 6px; height: 6px; border-radius: 50%; background: var(--oak-deep); display: inline-block; box-shadow: 0 0 0 0 rgba(168, 130, 71, .6); animation: pulse 2.4s ease-out infinite; vertical-align: middle; margin-right: 7px; }
  @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(168, 130, 71, .45); } 70% { box-shadow: 0 0 0 8px rgba(168, 130, 71, 0); } 100% { box-shadow: 0 0 0 0 rgba(168, 130, 71, 0); } }
  @media (max-width: 720px) { .topbar .meta .meta-hide { display: none; } }

  /* Mark / logo ----------------------------------------------------------- */
  .mark {
    width: 22px; height: 22px; position: relative; display: inline-block;
  }
  .mark::before, .mark::after {
    content: ""; position: absolute; inset: 0;
    border: 1.25px solid var(--ink);
  }
  .mark::after { transform: translate(4px, 4px); border-color: var(--oak-deep); }

  /* Buttons --------------------------------------------------------------- */
  .btn {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 14px 22px; border-radius: 999px;
    background: var(--ink); color: var(--limewash);
    border: 1px solid var(--ink);
    font-family: "Geist", sans-serif; font-size: 13.5px;
    letter-spacing: 0.01em; cursor: default;
    transition: transform .15s ease, background .2s ease;
  }
  .btn:hover { background: #100D08; transform: translateY(-1px); }
  .btn.ghost {
    background: transparent; color: var(--ink);
    border: 1px solid var(--line-2);
  }
  .btn.ghost:hover { background: rgba(34,30,24,.04); }
  .btn .arrow { transition: transform .25s ease; }
  .btn:hover .arrow { transform: translateX(3px); }

  /* Section frame --------------------------------------------------------- */
  section { padding: 120px 0; position: relative; }
  section[data-bg="plaster"] { background: var(--plaster); }
  section[data-bg="ink"] { background: var(--ink); color: var(--limewash); }
  section[data-bg="ink"] .eyebrow { color: var(--oak); }
  section[data-bg="ink"] .hairline { background: rgba(255,255,255,.12); }

  .sect-head {
    display: grid; grid-template-columns: 220px 1fr; gap: 80px;
    align-items: baseline; margin-bottom: 64px;
  }
  @media (max-width: 820px) { .sect-head { grid-template-columns: 1fr; gap: 16px; margin-bottom: 40px; } }
  .sect-code {
    font-family: "JetBrains Mono", monospace; font-size: 11px;
    letter-spacing: 0.14em; text-transform: uppercase; color: var(--stone);
    padding-top: 12px; border-top: 1px solid var(--line-2);
  }
  section[data-bg="ink"] .sect-code { color: var(--plaster-2); border-top-color: rgba(255,255,255,.2); }
  .sect-title {
    font-family: "Instrument Serif", serif;
    font-size: clamp(40px, 5.4vw, 78px);
    line-height: 0.98; letter-spacing: -0.015em;
    max-width: 16ch;
  }
  .sect-title em { font-style: italic; color: var(--oak-deep); }
  section[data-bg="ink"] .sect-title em { color: var(--oak); }
  .sect-title .small { font-size: 0.55em; display: block; color: var(--stone); margin-top: 14px; max-width: 30ch; line-height: 1.35; }
  section[data-bg="ink"] .sect-title .small { color: var(--plaster-2); }

  /* Architectural placeholder (striped block) ----------------------------- */
  .placeholder {
    position: relative; background: var(--plaster);
    border: 1px solid var(--line-2); overflow: hidden;
    display: flex; align-items: flex-end; justify-content: flex-start;
  }
  .placeholder::before {
    content: ""; position: absolute; inset: 0;
    background-image: repeating-linear-gradient(
      135deg,
      transparent 0 9px,
      rgba(34,30,24,.06) 9px 10px
    );
  }
  .placeholder .ph-label {
    position: relative; z-index: 2;
    margin: 14px; padding: 6px 10px;
    font-family: "JetBrains Mono", monospace; font-size: 10px;
    letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink);
    background: var(--limewash); border: 1px solid var(--line-2);
  }

  /* Swatch chips ---------------------------------------------------------- */
  .swatch-row { display: flex; gap: 0; flex-wrap: wrap; }
  .swatch {
    display: flex; flex-direction: column; gap: 6px;
    padding: 0; flex: 1; min-width: 110px;
  }
  .swatch .chip { aspect-ratio: 1 / 1.1; border: 1px solid var(--line-2); border-right: 0; }
  .swatch:last-child .chip { border-right: 1px solid var(--line-2); }
  .swatch .meta-line {
    display: flex; justify-content: space-between;
    font-family: "JetBrains Mono", monospace; font-size: 10px;
    letter-spacing: 0.08em; text-transform: uppercase; color: var(--stone);
    padding: 8px 10px 0;
  }

  /* Scroll utility */
  html { scroll-behavior: smooth; }

  /* Focus / accessibility */
  button:focus-visible, [tabindex]:focus-visible {
    outline: 2px solid var(--oak-deep); outline-offset: 3px;
  }
</style>
