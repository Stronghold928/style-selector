# Deploy the static site to GitHub Pages.
#
# This is a no-build static site: index.html loads JSX directly via
# Babel Standalone in the browser, so we just upload the repo contents
# (minus a few dev-only paths) as the Pages artifact.

name: Deploy to GitHub Pages

on:
  # Run on every push to the default branch.
  push:
    branches: [main]
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

# Permissions required by the official Pages deploy action.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one in-flight deploy at a time; cancel stale runs but let
# the in-progress production deploy finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload the whole repo root — index.html lives here and
          # references src/ and assets/ with relative paths.
          path: "."

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
